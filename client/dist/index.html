<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preferanse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #16532a;
      --surface: #0e3b1c;
      --surface2: #1a4d28;
      --text: #f0e6c8;
      --accent: #d4a843;
      --danger: #c0392b;
      --blue: #2471a3;
      --purple: #8e44ad;
      --card-bg: #fffdf7;
      --card-border: #c8c0a8;
      --suit-red: #c0392b;
      --suit-blue: #2471a3;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- Suit background ---- */
    .suit-bg {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
      font-size: 2rem; color: rgba(255,255,255,0.045);
      line-height: 2.2; letter-spacing: 14px;
      padding: 16px; word-break: break-all;
    }

    /* ---- Header ---- */
    header {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 0 8px; width: 100%;
    }
    h1 {
      color: var(--accent); letter-spacing: 3px;
      font-size: 2.2rem; text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 8px;
    }

    /* ---- Language selector ---- */
    .lang-selector { display: flex; gap: 6px; margin-bottom: 4px; }
    .lang-btn {
      background: transparent; border: 2px solid var(--accent);
      color: var(--accent); padding: 4px 14px; font-size: 0.85rem;
      border-radius: 5px; cursor: pointer; font-weight: bold;
      transition: background 0.15s, color 0.15s;
    }
    .lang-btn.active { background: var(--accent); color: #1a1a1a; }
    .lang-btn:hover:not(.active) { background: rgba(212,168,67,0.15); }

    /* ---- Rules button ---- */
    #rules-btn {
      position: fixed; top: 14px; right: 18px; z-index: 150;
      background: var(--accent); color: #1a1a1a; border: none;
      border-radius: 6px; padding: 8px 16px; font-weight: bold;
      font-size: 0.9rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: opacity 0.2s;
    }
    #rules-btn:hover { opacity: 0.85; }

    /* ---- Main layout ---- */
    #layout {
      display: flex; gap: 16px; width: 100%;
      max-width: 1220px; padding: 0 16px 32px;
      align-items: flex-start; position: relative; z-index: 1;
    }
    #main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }

    /* ---- Chat (sidebar) ---- */
    #chat-panel {
      width: 240px; flex-shrink: 0;
      position: sticky; top: 16px;
      height: calc(100vh - 130px);
      background: var(--surface); border-radius: 10px; padding: 14px;
      border: 1px solid rgba(212,168,67,0.2);
      display: flex; flex-direction: column; gap: 10px;
    }
    #chat-panel h3 { color: var(--accent); font-size: 1rem; flex-shrink: 0; }
    #chat-messages {
      flex: 1; overflow-y: auto; background: rgba(0,0,0,0.25);
      border-radius: 6px; padding: 8px 10px; font-size: 0.88rem;
    }
    .chat-msg { margin-bottom: 5px; line-height: 1.4; }
    .chat-name { color: var(--accent); font-weight: bold; }
    #chat-input-row { display: flex; gap: 6px; flex-shrink: 0; }
    #chat-input {
      flex: 1; padding: 8px 10px; border-radius: 7px;
      border: 1px solid #3a5a42; background: var(--surface2);
      color: var(--text); font-size: 0.9rem; min-width: 0;
    }
    #chat-send-btn { padding: 8px 12px; font-size: 0.9rem; flex-shrink: 0; }

    /* ---- General buttons ---- */
    button {
      padding: 11px 26px; border-radius: 8px; border: none;
      background: var(--accent); color: #1a1a1a; font-weight: bold;
      cursor: pointer; font-size: 1rem; transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: default; transform: none; }
    button.danger { background: var(--danger); color: #fff; }
    button.secondary {
      background: var(--surface2); color: var(--text);
      border: 2px solid var(--accent);
    }

    /* ---- Lobby ---- */
    #lobby { display: flex; flex-direction: column; gap: 14px; align-items: center; margin-top: 30px; }
    #lobby input {
      padding: 12px 16px; border-radius: 8px; border: 2px solid var(--accent);
      background: var(--surface); color: var(--text); font-size: 1.05rem; width: 280px;
    }
    #player-list { list-style: none; width: 280px; }
    #player-list li {
      padding: 8px 14px; background: var(--surface); border-radius: 6px;
      margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 1rem;
    }
    .badge {
      font-size: 0.72rem; background: var(--accent); color: #1a1a1a;
      border-radius: 3px; padding: 2px 6px; font-weight: bold;
    }
    #settings-area { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
    #settings-area input { width: 80px; padding: 8px; border-radius: 6px; border: 1px solid var(--accent); background: var(--surface); color: var(--text); font-size: 1rem; }

    /* ---- Game ---- */
    #game { display: none; flex-direction: column; gap: 14px; }

    .info-bar {
      display: flex; gap: 20px; align-items: center; font-size: 0.95rem;
      background: var(--surface); border-radius: 8px; padding: 10px 16px;
      border: 1px solid rgba(212,168,67,0.3);
    }
    .info-bar span { color: var(--accent); font-weight: bold; font-size: 1rem; }

    #table-players { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .player-box {
      background: var(--surface); border-radius: 10px; padding: 12px 14px;
      border: 2px solid transparent; transition: border-color 0.3s, box-shadow 0.3s;
    }
    .player-box.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(212,168,67,0.3); }
    .player-box .pname { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
    .player-box .pscore { font-size: 0.82rem; color: #bbb; margin-top: 3px; }
    .player-box .pcards { font-size: 0.85rem; color: #ccc; }
    .dealer-marker { color: var(--accent); font-size: 0.78rem; }

    #trick-area {
      min-height: 130px; background: var(--surface); border-radius: 10px;
      display: flex; align-items: center; justify-content: center; gap: 14px;
      padding: 14px; flex-wrap: wrap;
    }

    /* ---- Cards ---- */
    .card {
      background: var(--card-bg); border: 2px solid var(--card-border);
      border-radius: 8px; padding: 8px 14px; cursor: pointer;
      font-size: 1.4rem; font-weight: bold; min-width: 54px; text-align: center;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none; color: #1a1a1a;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 6px 16px rgba(0,0,0,0.35); }
    .card.red { color: var(--suit-red); }
    .card.disabled { opacity: 0.45; cursor: default; transform: none; box-shadow: none; }
    .card.in-trick { cursor: default; }
    .card.selected { outline: 3px solid var(--accent); transform: translateY(-8px); }

    #my-hand {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      min-height: 70px; padding: 10px; background: rgba(0,0,0,0.18); border-radius: 10px;
    }

    /* ---- Action panel ---- */
    #action-panel {
      background: var(--surface); border-radius: 10px; padding: 16px;
      min-height: 70px; display: flex; flex-direction: column; gap: 10px;
    }
    #action-panel h3 { color: var(--accent); margin-bottom: 6px; font-size: 1.1rem; }
    .action-row { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ---- Bid grid ---- */
    #bid-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 6px; width: 100%;
    }
    .bid-btn {
      width: 100%; background: #fff; color: #1a1a1a;
      border: 2px solid #888; border-radius: 7px;
      padding: 10px 4px; font-size: 1.05rem; font-weight: bold;
      cursor: pointer; transition: transform 0.1s, opacity 0.15s;
      text-align: center;
    }
    .bid-btn:hover:not([disabled]) { transform: translateY(-2px); opacity: 0.88; }
    .bid-btn[disabled] { opacity: 0.22; cursor: default; transform: none; }
    .bid-btn.bid-red { color: var(--suit-red); border-color: var(--suit-red); }
    .bid-btn.bid-blue { color: var(--suit-blue); border-color: var(--suit-blue); }
    .bid-btn.bid-misere { color: var(--purple); border-color: var(--purple); font-style: italic; }

    /* ---- Scoring ---- */
    #bullet-panel { background: var(--surface); border-radius: 10px; padding: 14px; }
    #bullet-panel h3 { color: var(--accent); margin-bottom: 10px; font-size: 1.1rem; }
    #bullet-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    #bullet-table th, #bullet-table td { border: 1px solid #3a5a42; padding: 5px 10px; text-align: center; }
    #bullet-table th { background: rgba(0,0,0,0.35); color: var(--accent); }

    #status { text-align: center; font-size: 1rem; color: #ccc; min-height: 26px; }
    #error-msg { color: var(--danger); text-align: center; min-height: 22px; font-size: 0.92rem; }

    #talon-area { display: flex; gap: 10px; justify-content: center; padding: 6px 0; align-items: center; min-height: 30px; }

    /* ---- Hand result overlay ---- */
    #hand-result {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      align-items: center; justify-content: center; z-index: 100;
    }
    #hand-result.show { display: flex; }
    #hand-result-box {
      background: var(--surface); border-radius: 12px; padding: 28px;
      min-width: 340px; text-align: center; border: 2px solid var(--accent);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #hand-result-box h2 { color: var(--accent); margin-bottom: 14px; font-size: 1.3rem; }
    #hand-result-box table { width: 100%; margin: 14px 0; font-size: 0.92rem; }
    #hand-result-box td, #hand-result-box th { padding: 6px 12px; border: 1px solid #3a5a42; }
    #hand-result-box th { color: var(--accent); }

    /* ---- Rules modal ---- */
    #rules-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82);
      align-items: center; justify-content: center; z-index: 200;
    }
    #rules-modal.show { display: flex; }
    #rules-box {
      background: var(--surface); border-radius: 12px; padding: 28px 32px;
      max-width: 620px; width: 92%; max-height: 85vh; overflow-y: auto;
      border: 2px solid var(--accent); position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    #rules-box h2 { color: var(--accent); margin-bottom: 16px; font-size: 1.4rem; }
    #rules-box h3 { color: var(--accent); margin: 14px 0 6px; font-size: 1.05rem; }
    #rules-box p, #rules-box li { font-size: 0.95rem; line-height: 1.6; margin-bottom: 5px; }
    #rules-box ul { padding-left: 20px; margin-bottom: 6px; }
    #rules-close-btn {
      position: absolute; top: 14px; right: 16px;
      background: transparent; color: var(--text); border: none;
      font-size: 1.6rem; padding: 2px 10px; cursor: pointer; line-height: 1;
    }
    #rules-close-btn:hover { color: var(--accent); }

    .hidden { display: none !important; }

    @media (max-width: 800px) {
      #layout { flex-direction: column; }
      #chat-panel { width: 100%; position: static; height: 220px; }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-BJEbvZ7Q.js"></script>
</head>
<body>
  <div class="suit-bg" aria-hidden="true"></div>
  <button id="rules-btn">Rules</button>

  <header>
    <h1>Preferanse</h1>
    <div class="lang-selector">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="lt">LT</button>
      <button class="lang-btn" data-lang="pl">PL</button>
    </div>
  </header>

  <div id="layout">
    <div id="main-content">

      <!-- LOBBY -->
      <div id="lobby">
        <input id="name-input" type="text" maxlength="20" />
        <div id="settings-area" class="hidden">
          <label id="label-taskai-target" style="color:var(--accent);font-size:0.95rem"></label>
          <input id="bullet-size-input" type="number" min="5" max="100" value="10" />
          <button id="set-settings-btn"></button>
        </div>
        <button id="join-btn"></button>
        <ul id="player-list"></ul>
        <button id="start-btn" disabled></button>
        <div id="error-msg"></div>
      </div>

      <!-- GAME -->
      <div id="game">
        <div class="info-bar">
          <div><span id="label-hand"></span>: <span id="hand-num">1</span></div>
          <div><span id="label-taskai"></span>: <span id="bullet-size-display">10</span></div>
          <div><span id="label-bid"></span>: <span id="current-bid-display">—</span></div>
        </div>

        <div id="table-players"></div>
        <div id="talon-area"></div>
        <div id="trick-area"></div>
        <div id="my-hand"></div>

        <div id="action-panel">
          <div id="status"></div>
        </div>

        <div id="bullet-panel">
          <h3 id="bullet-panel-title"></h3>
          <table id="bullet-table">
            <thead><tr id="bullet-header"></tr></thead>
            <tbody id="bullet-body"></tbody>
          </table>
        </div>

        <div id="error-msg" style="margin-top:8px"></div>
      </div>

    </div><!-- end #main-content -->

    <!-- CHAT SIDEBAR -->
    <div id="chat-panel">
      <h3 id="chat-title"></h3>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" maxlength="200" />
        <button id="chat-send-btn"></button>
      </div>
    </div>

  </div><!-- end #layout -->

  <!-- HAND RESULT OVERLAY -->
  <div id="hand-result">
    <div id="hand-result-box">
      <h2 id="result-title">Hand Result</h2>
      <table id="result-table">
        <thead><tr id="result-header"></tr></thead>
        <tbody id="result-body"></tbody>
      </table>
      <button id="next-hand-btn"></button>
    </div>
  </div>

  <!-- RULES MODAL -->
  <div id="rules-modal">
    <div id="rules-box">
      <button id="rules-close-btn">×</button>
      <h2 id="rules-title-text"></h2>
      <div id="rules-content"></div>
      <br/>
      <button id="rules-close-bottom" style="width:100%"></button>
    </div>
  </div>

</body>
</html>
